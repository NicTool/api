name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CI: true
  NODE_ENV: test
  NODE_VER: 22

jobs:
  lint:
    permissions:
      contents: read
    uses: NicTool/.github/.github/workflows/lint.yml@main

  coverage:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Start MySQL
        run: sudo /etc/init.d/mysql start
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VER }}
      - uses: actions/checkout@v6
      - run: npm install
      - name: Initialize MySQL
        run: sh sql/init-mysql.sh
      - name: run coverage
        run: npx -y c8 --reporter=lcov npm test
        env:
          NODE_ENV: cov
      - name: codecov
        uses: codecov/codecov-action@v2
      - name: Coveralls
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.github_token }}

  get-lts:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - id: get
        uses: msimerson/node-lts-versions@v1
    outputs:
      active: ${{ steps.get.outputs.active }}
      maintenance: ${{ steps.get.outputs.maintenance }}
      lts: ${{ steps.get.outputs.lts }}
      current: ${{ steps.get.outputs.current }}
      min: ${{ steps.get.outputs.min }}

  test:
    permissions:
      contents: read
    needs: [ get-lts ]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: ${{ fromJson(needs.get-lts.outputs.lts) }}
      fail-fast: false
    steps:
      - run: sudo /etc/init.d/mysql start
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: sh sql/init-mysql.sh
      - run: npm install
      - run: npm test

  test-mac:
    permissions:
      contents: read
    needs: [ get-lts ]
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: ${{ fromJson(needs.get-lts.outputs.active) }}
      fail-fast: false
    steps:
      - name: Install & Start MySQL
        run: |
          brew install mysql@8.4
          brew services start mysql@8.4
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        name: Node ${{ matrix.node-version }} on ${{ matrix.os }}
        with:
          node-version: ${{ matrix.node-version }}
      - run: sh sql/init-mysql.sh
      - run: npm install
      - run: npm test

  test-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate .env
        run: ./docker/generate-env.sh
      - name: Build and start services
        run: docker compose -f docker/docker-compose.yml up --build -d --wait
      - name: Run tests
        run: docker compose -f docker/docker-compose.yml exec api npm test
      - name: Logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs
      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  test-win:
    permissions:
      contents: read
    needs: [ get-lts ]
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: ${{ fromJson(needs.get-lts.outputs.active) }}
        experimental: [true]
      fail-fast: false
    steps:
      - name: Install MySQL
        run: |
          choco install mysql
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        name: Node ${{ matrix.node-version }}
        with:
          node-version: ${{ matrix.node-version }}
      - run: sh sql/init-mysql.sh
      - run: npm install
      - run: sh test.sh
