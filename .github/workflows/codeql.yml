name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [main]
  schedule:
    - cron: '18 7 * * 4'

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: NicTool/.github/.github/workflows/codeql.yml@main
